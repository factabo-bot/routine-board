<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ルーティン盤面</title>
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <h1><span class="mascot mascot-title mascot-slot"></span>ルーティン盤面</h1>
  <div id="header-sub"></div>
</header>

<main>
  <!-- 盤面 -->
  <section id="view-board" class="view">
    <div id="date-strip" class="date-strip"></div>
    <div class="board-status">
      <span id="board-counter" class="counter"></span>
      <span id="board-date-label" class="date-label"></span>
    </div>
    <div id="board-grid" class="board-grid"></div>
    <div id="board-empty" class="empty-note hidden">
      <span class="mascot mascot-empty mascot-slot"></span>
      <p>ルーティンがまだありません。<br>「設定」タブから追加してください。</p>
    </div>
  </section>

  <!-- ToDoファーム -->
  <section id="view-farm" class="view hidden">
    <div class="farm-card">
      <div class="farm-head"><span class="mascot mascot-farm mascot-slot"></span><span>ToDoファーム</span></div>
      <div class="farm-scene">
        <img id="farm-stage-img" alt="">
        <span class="mascot mascot-field mascot-slot"></span>
        <span id="farm-pig" class="mascot mascot-pig-field hidden"></span>
      </div>
      <div id="farm-stage-name" class="farm-stage-name"></div>
      <div class="farm-progress"><div id="farm-bar" class="farm-bar"></div></div>
      <div id="farm-status" class="farm-status"></div>
      <div id="farm-steps" class="farm-steps"></div>
    </div>
    <form id="todo-form" class="todo-form">
      <input id="todo-input" type="text" placeholder="ToDoを追加" maxlength="100" autocomplete="off">
      <button type="submit" class="btn btn-primary">追加</button>
    </form>
    <ul id="todo-list" class="todo-list"></ul>
    <div class="todo-actions">
      <button id="todo-clear" class="btn">完了を整理</button>
    </div>
  </section>

  <!-- 設定 -->
  <section id="view-settings" class="view hidden">
    <h2>ルーティン</h2>
    <ul id="routine-list" class="routine-list"></ul>
    <button id="routine-add" class="btn btn-primary">＋ ルーティンを追加</button>

    <h2>バックアップ</h2>
    <div class="backup-box">
      <p id="backup-status"></p>
      <div class="backup-buttons">
        <button id="export-btn" class="btn">エクスポート</button>
        <button id="import-btn" class="btn">インポート</button>
        <input id="import-file" type="file" accept="application/json,.json" hidden>
      </div>
    </div>

    <h2>保存状態</h2>
    <p id="storage-status" class="storage-status"></p>
  </section>
</main>

<nav class="tab-bar">
  <button class="tab-btn active" data-view="board">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="4" y="4" width="16" height="16" rx="3"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></svg>
    <span>盤面</span>
  </button>
  <button class="tab-btn" data-view="farm">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16"/><path d="M12 20v-8"/><path d="M12 12C12 8.7 9.3 6 6 6c0 3.3 2.7 6 6 6z"/><path d="M12 10c0-2.8 2.2-5 5-5 0 2.8-2.2 5-5 5z"/></svg>
    <span>ファーム</span>
  </button>
  <button class="tab-btn" data-view="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><circle cx="15" cy="7" r="2.4"/><line x1="4" y1="15" x2="20" y2="15"/><circle cx="9" cy="15" r="2.4"/></svg>
    <span>設定</span>
  </button>
</nav>

<!-- ルーティン追加・編集ダイアログ -->
<dialog id="routine-dialog">
  <form id="routine-form">
    <h2 id="routine-dialog-title">ルーティンを追加</h2>
    <label>名前
      <input id="rf-title" type="text" required maxlength="30" autocomplete="off">
    </label>
    <span class="field-label">アイコン</span>
    <div id="rf-icon-grid" class="icon-grid"></div>
    <span class="field-label">色</span>
    <div id="rf-colors" class="color-picks"></div>
    <label>時刻（任意）
      <input id="rf-time" type="time">
    </label>
    <span class="field-label">曜日</span>
    <div id="rf-days" class="day-picks"></div>
    <div class="dialog-buttons">
      <button type="button" id="rf-cancel" class="btn">キャンセル</button>
      <button type="submit" class="btn btn-primary">保存</button>
    </div>
  </form>
</dialog>

<script src="app.js"></script>
</body>
</html>
